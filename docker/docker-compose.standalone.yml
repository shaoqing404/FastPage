services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: pageindex-service-api:local
    env_file:
      - .env
    environment:
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-22223}
    command:
      - /app/docker/docker-entrypoint.sh
    ports:
      - "${API_PORT:-22223}:${API_PORT:-22223}"
    volumes:
      - app_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:${API_PORT:-22223}/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    image: pageindex-service-frontend:local
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  app_data:
