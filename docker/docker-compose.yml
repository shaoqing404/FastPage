services:
  mysql:
    profiles: ["full"]
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pageindex}
      MYSQL_USER: ${MYSQL_USER:-pageindex}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-pageindex_service123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-pageindex_service123}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD:-pageindex_service123}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    profiles: ["full"]
    image: redis:7-alpine
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-pageindex_service123}
    command:
      - sh
      - -lc
      - redis-server --appendonly yes --requirepass "$REDIS_PASSWORD"
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    profiles: ["full"]
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-pageindex_service123}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-pageindex_service123}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  elasticsearch:
    profiles: ["full"]
    image: elasticsearch:8.19.15
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "127.0.0.1:9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health | grep -vq '\"status\":\"red\"'"]
      interval: 20s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  api:
    profiles: ["full"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.arm64
    image: pageindex-service-api:local
    env_file:
      - .env
    environment:
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-22223}
    command:
      - /app/docker/docker-entrypoint.sh
    ports:
      - "127.0.0.1:${API_PORT:-22223}:${API_PORT:-22223}"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - app_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:${API_PORT:-22223}/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  frontend:
    profiles: ["full"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    image: pageindex-service-frontend:local
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    depends_on:
      - api
    restart: unless-stopped

  api-local:
    profiles: ["local"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.arm64
    image: pageindex-service-api:local
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-dev}
      API_HOST: 0.0.0.0
      API_PORT: ${API_PORT:-22223}
      DATA_DIR: /app/data
      DATABASE_URL: sqlite:////app/data/app.db
      STORAGE_BACKEND: local
      TASK_QUEUE_BACKEND: local
      REDIS_URL: ""
      MINIO_ENDPOINT: ""
      MINIO_ACCESS_KEY: ""
      MINIO_SECRET_KEY: ""
      MINIO_BUCKET: ""
      MINIO_PREFIX_PATH: ""
      MINIO_SECURE: "false"
    command:
      - /app/docker/docker-entrypoint.sh
      - local
    ports:
      - "127.0.0.1:${API_PORT:-22223}:${API_PORT:-22223}"
    volumes:
      - app_data_local:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:${API_PORT:-22223}/healthz"]
      interval: 15s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  app_data:
  app_data_local:
  mysql_data:
  redis_data:
  minio_data:
  es_data:
