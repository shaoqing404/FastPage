services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-pageindex}
      MYSQL_USER: ${MYSQL_USER:-pageindex}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-pageindex}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root-change-me}
    command:
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD:-root-change-me}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    image: pageindex-service-api:local
    env_file:
      - .env
    environment:
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-22223}
    command:
      - sh
      - -lc
      - uvicorn app.main:app --host ${API_HOST:-0.0.0.0} --port ${API_PORT:-22223}
    ports:
      - "127.0.0.1:${API_PORT:-22223}:${API_PORT:-22223}"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - app_data:/app/data
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: Dockerfile.worker
    image: pageindex-service-worker:local
    env_file:
      - .env
    environment:
      WORKER_NODE_CODE_PREFIX: ${WORKER_NODE_CODE_PREFIX:-worker}
    command:
      - sh
      - -lc
      - python -m app.worker
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - app_data:/app/data
    restart: unless-stopped

volumes:
  app_data:
  mysql_data:
  redis_data:
  minio_data:
