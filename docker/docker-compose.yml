services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: pageindex-service:local
    env_file:
      - .env
    environment:
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-22223}
    command:
      - sh
      - -lc
      - uvicorn app.main:app --host ${API_HOST:-0.0.0.0} --port ${API_PORT:-22223}
    ports:
      - "${API_PORT:-22223}:${API_PORT:-22223}"
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: pageindex-service:local
    env_file:
      - .env
    environment:
      WORKER_NODE_CODE_PREFIX: ${WORKER_NODE_CODE_PREFIX:-worker}
    command:
      - sh
      - -lc
      - python -m app.worker
    restart: unless-stopped

